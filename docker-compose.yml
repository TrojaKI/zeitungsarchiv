services:
  archiv:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./inbox:/app/inbox         # scan input (host ↔ container)
      - ./archive:/app/archive     # processed articles + images (persistent)
      - ./db:/app/db               # SQLite database file (persistent)
      - ./app:/app/app             # live code reload during development
    environment:
      # Ollama: use host.docker.internal to reach Ollama on the host machine,
      # or replace with the URL of a dedicated Ollama container/server.
      #- OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      #- OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5vl:3b}
      - LLM_PROVIDER=$LLM_PROVIDER
      - OLLAMA_MODELS=$OLLAMA_MODELS
      - OPENROUTER_MODEL=$OPENROUTER_MODEL
      - OPENROUTER_MODELS=$OPENROUTER_MODELS
      - OPENROUTER_API_KEY=$OPENROUTER_API_KEY
      - INBOX_DIR=/app/inbox
      - ARCHIVE_DIR=/app/archive
      - DB_PATH=/app/db/archive.db
      - OCR_LANG=deu
      - OCR_CONFIDENCE_THRESHOLD=70
      - WATCH_INBOX=true
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
