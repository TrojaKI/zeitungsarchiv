; vuescan.ini — CanoScan 8800F, Zeitungsartikel
; Generated for project: zeitungsarchiv
; Path Linux:  ~/.vuescan/vuescan.ini
; Path macOS:  ~/Library/VueScan/vuescan.ini
;
; IMPORTANT: Replace {INBOX_DIR} with the actual inbox path before use.
; VueScan must be restarted after changes to this file.

[VueScan]

[Input]
Source=8800F

[Input-8800F-Flatbed]
; 400 DPI — optimal for OCR; grayscale saves space
BitsPerPixel=5
; Resolution index 5 = 400 DPI in VueScan
ScanResolution=5
; TIFF output (lossless master for OCR)
FileType=2

[Filter-8800F-Flatbed]
; Descreen removes halftone dot patterns from newspaper print
Descreen=1
DescreenLines=133
; Light sharpening improves OCR readability
Sharpen=1
; Light grain reduction
GrainReduction=1
; Do not auto-level — preserve original tonal range
AutoLevel=0

[Output]
; Output only TIFF — no JPEG, no PDF
TIFFFile=1
JPEGFile=0
PDFFile=0
; Filename pattern: date+time for unique, sortable names
; Replace /path/to/inbox with the actual inbox directory path
TIFFFileName=/path/to/inbox/scan_YYYY-MM-DD-0001+.tif
; No compression — lossless master
TIFFFileType=0
; Do not overwrite existing files
OutputOverwrite=0
; Auto-rotate based on content
AutoRotate=1

[Prefs]
; German UI language (1 = English, change if needed)
Language=1
