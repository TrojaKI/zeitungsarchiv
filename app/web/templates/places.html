{% extends "base.html" %}
{% block title %}Adressen – Zeitungsarchiv{% endblock %}
{% block head %}
<link rel="stylesheet" href="/static/leaflet/leaflet.min.css">
<style>
  .tab-bar { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 2px solid #ccc; }
  .tab-btn {
    padding: .5rem 1.4rem; border: none; background: none; cursor: pointer;
    font-size: 1rem; border-bottom: 3px solid transparent; margin-bottom: -2px;
    color: #555;
  }
  .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  #map { height: 520px; border-radius: 6px; border: 1px solid #ddd; }
  .leaflet-popup-content strong { display: block; margin-bottom: .3rem; }
  .leaflet-popup-content .rating-badge {
    display: inline-block; padding: .1rem .5rem; border-radius: 4px;
    font-size: .8rem; background: #e5e7eb; margin-top: .3rem;
  }
  .leaflet-popup-content a { color: #2563eb; }
</style>
{% endblock %}
{% block content %}
<section class="search-box">
  <form hx-get="/places" hx-target="#places-results"
        hx-trigger="submit, input[target.name=='q'] delay:400ms, change[target.tagName=='SELECT'] delay:100ms">
    <div class="search-row">
      <input type="text" name="q" value="{{ q }}" placeholder="Name, Ort, Adresse…" autofocus>
      <button type="submit">Suchen</button>
    </div>
    <div class="filter-row">
      <select name="country"
              hx-get="/places/cities" hx-target="#city-select" hx-include="[name='country']"
              hx-trigger="change">
        <option value="">Alle Länder</option>
        {% for c in countries %}
          <option value="{{ c }}" {% if c == country %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
      <select name="city" id="city-select">
        <option value="">Alle Orte</option>
        {% for c in cities %}
          <option value="{{ c }}" {% if c == city %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
  </form>
</section>

<div class="tab-bar">
  <button class="tab-btn" onclick="switchTab('list', this)">Liste</button>
  <button class="tab-btn active" onclick="switchTab('map', this)">Karte</button>
</div>

<div id="tab-list" class="tab-panel">
  <div id="places-results">
    {% include "places_results.html" %}
  </div>
</div>

<div id="tab-map" class="tab-panel active">
  <div id="map"></div>
</div>

<script src="/static/leaflet/leaflet.min.js"></script>
<script>
// Fix Leaflet default icon paths for locally bundled assets
delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
  iconUrl:      '/static/leaflet/images/marker-icon.png',
  iconRetinaUrl:'/static/leaflet/images/marker-icon-2x.png',
  shadowUrl:    '/static/leaflet/images/marker-shadow.png',
});

let mapInitialized = false;
let leafletMap = null;

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'map' && !mapInitialized) {
    initMap();
  }
}

let mapMarkers = [];

function getFilterParams() {
  const form = document.querySelector('form[hx-get="/places"]');
  return new URLSearchParams(new FormData(form)).toString();
}

function loadMapMarkers() {
  if (!mapInitialized) return;
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];

  fetch('/places/map-data?' + getFilterParams())
    .then(r => r.json())
    .then(places => {
      if (!places.length) return;
      const bounds = [];
      places.forEach(p => {
        const marker = L.marker([p.lat, p.lng]).addTo(leafletMap);
        const ratingHtml = p.rating
          ? `<span class="rating-badge">Wertung: ${p.rating}</span>` : '';
        const desc = p.description
          ? `<p style="margin:.3rem 0">${p.description.substring(0, 120)}${p.description.length > 120 ? '…' : ''}</p>` : '';
        marker.bindPopup(
          `<strong>${p.name || '?'}</strong>` +
          (p.city ? `<div style="color:#666;font-size:.85rem">${p.city}</div>` : '') +
          desc +
          ratingHtml +
          `<br><a href="/articles/${p.article_id}">Zum Artikel →</a>`
        );
        bounds.push([p.lat, p.lng]);
        mapMarkers.push(marker);
      });
      if (bounds.length) {
        leafletMap.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
      }
    });
}

// Initialize map on page load since it is the default tab
document.addEventListener('DOMContentLoaded', function() { initMap(); });

function initMap() {
  mapInitialized = true;
  leafletMap = L.map('map').setView([47.5, 14.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(leafletMap);
  loadMapMarkers();
}

// Reload map markers after HTMX settles the places results
document.addEventListener('htmx:afterSettle', function(e) {
  if (e.detail.target && e.detail.target.id === 'places-results') {
    loadMapMarkers();
  }
});
</script>
{% endblock %}
