<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Zeitungsarchiv{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a href="/" class="brand">Zeitungsarchiv</a>
    <nav>
      <a href="/">Suche</a>
      <a href="/review">
        Review
        {% if review_count %}<span class="badge">{{ review_count }}</span>{% endif %}
      </a>
      <a href="/stats">Statistiken</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
