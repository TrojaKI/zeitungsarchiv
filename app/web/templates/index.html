{% extends "base.html" %}
{% block title %}Suche – Zeitungsarchiv{% endblock %}
{% block content %}
<section class="search-box">
  <form id="search-form"
        hx-get="/search"
        hx-target="#results"
        hx-push-url="true"
        hx-trigger="submit, input[target.name=='q'] delay:400ms, change[target.tagName=='SELECT'] delay:100ms">
    <div class="search-row">
      <input type="text" name="q" value="{{ q }}" placeholder="Stichwort suchen…" autofocus>
      <button type="submit">Suchen</button>
    </div>
    <div class="filter-row">
      <select name="newspaper">
        <option value="">Alle Zeitungen</option>
        {% for n in newspapers %}
          <option value="{{ n }}" {% if n == newspaper %}selected{% endif %}>{{ n }}</option>
        {% endfor %}
      </select>
      <select name="category">
        <option value="">Alle Kategorien</option>
        {% for c in categories %}
          <option value="{{ c }}" {% if c == category %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
      {% if sections %}
      <select name="section">
        <option value="">Alle Rubriken</option>
        {% for s in sections %}
          <option value="{{ s }}" {% if s == section %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
      {% endif %}
      <select name="location">
        <option value="">Alle Orte</option>
        {% for l in locations %}
          <option value="{{ l }}" {% if l == location %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
      <select name="sort">
        <option value="date_desc" {% if sort == 'date_desc' %}selected{% endif %}>Neueste zuerst</option>
        <option value="date_asc"  {% if sort == 'date_asc'  %}selected{% endif %}>Älteste zuerst</option>
        <option value="headline_asc" {% if sort == 'headline_asc' %}selected{% endif %}>Alphabetisch (Titel)</option>
        <option value="id_desc"   {% if sort == 'id_desc'   %}selected{% endif %}>Zuletzt hinzugefügt</option>
      </select>
      <label>Von <input type="date" name="date_from" value="{{ date_from }}"></label>
      <label>Bis <input type="date" name="date_to" value="{{ date_to }}"></label>
    </div>
  </form>
</section>
<div id="results">
  {% include "search_results.html" %}
</div>
{% endblock %}
